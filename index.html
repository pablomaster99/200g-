<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis 200g Premium — Matcha & CO</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f9fafb; }
    table { border-collapse: collapse; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PRODUCTS = [
      { id:"200g_premium", label:"200g Premium", shortLabel:"200g Prem.", color:"#1a3a2a", total:4547, newPct:36.2, returningPct:63.9, retentionRate:23.8, avgOrders:1.3, avgItems:2.7, aov:77.7, ltv:104.4 },
      { id:"80g_premium",  label:"80g Premium",  shortLabel:"80g Prem.",  color:"#2d6a4f", total:29140, newPct:36.9, returningPct:63.5, retentionRate:18.7, avgOrders:1.3, avgItems:2.9, aov:43.94, ltv:55.2 },
      { id:"30g_premium",  label:"30g Premium",  shortLabel:"30g Prem.",  color:"#52b788", total:23907, newPct:51.7, returningPct:48.6, retentionRate:13.7, avgOrders:1.2, avgItems:4.0, aov:37.41, ltv:44.3 },
      { id:"80g_original", label:"80g Original", shortLabel:"80g Orig.",  color:"#b7791f", total:24026, newPct:45.7, returningPct:54.6, retentionRate:14.5, avgOrders:1.2, avgItems:3.2, aov:35.38, ltv:42.3 },
      { id:"30g_original", label:"30g Original", shortLabel:"30g Orig.",  color:"#d4a017", total:18866, newPct:60.0, returningPct:40.4, retentionRate:11.4, avgOrders:1.2, avgItems:4.0, aov:35.25, ltv:40.7 },
    ];
    const BENCHMARK = 17;

    /* ── SVG BAR CHART ── */
    function BarChartSVG({ data, dataKeys, colors, height=280, maxY, yFmt, legendLabels }) {
      const [tip, setTip] = useState(null);
      const W=620, H=height, pad={t:20,r:20,b:48,l:54};
      const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
      const top = maxY || Math.ceil(Math.max(...data.flatMap(d=>dataKeys.map(k=>d[k]||0)))*1.15);
      const fmt = yFmt || (v=>`${v}`);
      const ticks = 5;
      const bGW = iW/data.length;
      const bW = (bGW*0.68)/dataKeys.length;
      const bPad = bGW*0.16;
      const yp = v => iH - (v/top)*iH;

      return (
        <div style={{position:'relative',width:'100%'}}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
            <g transform={`translate(${pad.l},${pad.t})`}>
              {Array.from({length:ticks+1},(_,i)=>{ const v=(top/ticks)*i; const y=yp(v); return (
                <g key={i}>
                  <line x1={0} y1={y} x2={iW} y2={y} stroke="#f0f0f0" strokeWidth={1}/>
                  <text x={-8} y={y} textAnchor="end" dominantBaseline="middle" fontSize={11} fill="#6b7280">{fmt(v)}</text>
                </g>
              );})}
              {data.map((d,di)=>(
                <g key={di}>
                  {dataKeys.map((k,ki)=>{
                    const val=d[k]||0;
                    const bH=Math.max(2,(val/top)*iH);
                    const bX=di*bGW+bPad+ki*bW;
                    const bY=yp(val);
                    return <rect key={ki} x={bX} y={bY} width={Math.max(1,bW-3)} height={bH} fill={colors[ki]} rx={4}
                      onMouseEnter={()=>setTip({di,ki,val,label:d.name,key:k,bX:bX+pad.l,bY:bY+pad.t})}
                      onMouseLeave={()=>setTip(null)} style={{cursor:'default'}}/>;
                  })}
                  <text x={di*bGW+bGW/2} y={iH+20} textAnchor="middle" fontSize={12} fill="#374151">{d.name}</text>
                </g>
              ))}
            </g>
          </svg>
          {tip && (
            <div style={{position:'absolute',left:`calc(${(tip.bX/W)*100}% + 4px)`,top:`${tip.bY}px`,background:'#fff',border:'1px solid #e5e7eb',borderRadius:'0.5rem',padding:'0.5rem 0.75rem',boxShadow:'0 4px 12px rgba(0,0,0,0.1)',fontSize:'0.75rem',pointerEvents:'none',zIndex:10,minWidth:'120px'}}>
              <p style={{fontWeight:600,color:'#1f2937',marginBottom:'2px'}}>{tip.label}</p>
              <p style={{color:'#4b5563'}}>{tip.key}: <strong>{fmt(tip.val)}</strong></p>
            </div>
          )}
          {legendLabels && (
            <div style={{display:'flex',justifyContent:'center',gap:'1.5rem',marginTop:'8px',flexWrap:'wrap'}}>
              {legendLabels.map((l,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <div style={{width:'12px',height:'12px',borderRadius:'2px',background:colors[i]}}/>
                  <span style={{fontSize:'0.75rem',color:'#374151'}}>{l}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ── STAT CARD ── */
    const StatCard = ({label,value,sub,highlight,color}) => (
      <div style={{borderRadius:'0.75rem',padding:'1rem',border:`1px solid ${highlight?'#4ade80':'#e5e7eb'}`,background:highlight?'#f0fdf4':'#fff'}}>
        <p style={{fontSize:'0.68rem',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'4px'}}>{label}</p>
        <p style={{fontSize:'1.5rem',fontWeight:700,color:color||(highlight?'#15803d':'#111827')}}>{value}</p>
        {sub&&<p style={{fontSize:'0.68rem',color:'#6b7280',marginTop:'4px'}}>{sub}</p>}
      </div>
    );

    /* ── INSIGHT TAG ── */
    const TAG_STYLES = {
      positive:{background:'#dcfce7',color:'#166534',border:'1px solid #bbf7d0'},
      negative:{background:'#fee2e2',color:'#991b1b',border:'1px solid #fecaca'},
      neutral:{background:'#dbeafe',color:'#1e40af',border:'1px solid #bfdbfe'},
      warning:{background:'#fef3c7',color:'#92400e',border:'1px solid #fde68a'},
    };
    const Tag = ({type,text}) => (
      <span style={{display:'inline-block',fontSize:'0.68rem',fontWeight:500,padding:'2px 8px',borderRadius:'9999px',marginRight:'4px',marginBottom:'4px',...TAG_STYLES[type]}}>{text}</span>
    );

    /* ── MAIN APP ── */
    function App() {
      const [tab, setTab] = useState("overview");

      const segData = PRODUCTS.map(p=>({name:p.shortLabel,"Clientes nuevos %":p.newPct,"Clientes recurrentes %":p.returningPct}));
      const retData = PRODUCTS.map(p=>({name:p.shortLabel,"Retención (%)":p.retentionRate}));
      const valData = PRODUCTS.map(p=>({name:p.shortLabel,"AOV (€)":p.aov,"LTV (€)":p.ltv}));

      const tabs = [
        {id:"overview",label:"Resumen"},{id:"segments",label:"Segmentos"},
        {id:"retention",label:"Retención"},{id:"value",label:"AOV & LTV"},{id:"verdict",label:"Veredicto"},
      ];

      const S = { /* spacing helpers */
        gap6:{display:'flex',flexDirection:'column',gap:'1.5rem'},
        gap5:{display:'flex',flexDirection:'column',gap:'1.25rem'},
        gap3:{display:'flex',flexDirection:'column',gap:'0.75rem'},
        gap2:{display:'flex',flexDirection:'column',gap:'0.5rem'},
        card:{background:'#fff',borderRadius:'0.75rem',border:'1px solid #e5e7eb',padding:'1rem'},
        cardL:{background:'#fff',borderRadius:'0.75rem',border:'1px solid #e5e7eb',padding:'1.25rem'},
      };

      return (
        <div style={{minHeight:'100vh',background:'#f9fafb'}}>

          {/* HEADER */}
          <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'1.25rem 1.5rem'}}>
            <div style={{maxWidth:'64rem',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <h1 style={{fontSize:'1.25rem',fontWeight:700,color:'#111827'}}>Análisis 200g Premium — Impacto en el negocio</h1>
                <p style={{fontSize:'0.875rem',color:'#6b7280',marginTop:'2px'}}>Oct 2025 – Mar 2026 · Fuente: Metorik · Retención: Oct 2025 – Ene 2026</p>
              </div>
              <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'0.5rem',padding:'8px 12px',textAlign:'center'}}>
                <p style={{fontSize:'0.68rem',color:'#16a34a',fontWeight:500}}>Veredicto</p>
                <p style={{fontSize:'0.875rem',fontWeight:700,color:'#166534'}}>✓ Beneficia</p>
              </div>
            </div>
          </div>

          {/* TABS */}
          <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'0 1.5rem'}}>
            <div style={{maxWidth:'64rem',margin:'0 auto',display:'flex',gap:'4px'}}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'12px 16px',fontSize:'0.875rem',fontWeight:500,borderBottom:`2px solid ${tab===t.id?'#16a34a':'transparent'}`,color:tab===t.id?'#15803d':'#6b7280',background:'none',border:'none',borderBottom:`2px solid ${tab===t.id?'#16a34a':'transparent'}`,cursor:'pointer',transition:'color 0.15s'}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* CONTENT */}
          <div style={{maxWidth:'64rem',margin:'0 auto',padding:'1.5rem'}}>

            {/* ── RESUMEN ── */}
            {tab==="overview" && (
              <div style={S.gap6}>
                <div>
                  <p style={{fontSize:'0.72rem',fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'12px'}}>200g Premium — Métricas clave</p>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'12px'}}>
                    <StatCard label="Retención" value="23.8%" sub="+6.8pp vs benchmark marca" highlight color="#1a3a2a"/>
                    <StatCard label="AOV" value="77.7€" sub="+77% vs 80g premium" highlight color="#1a3a2a"/>
                    <StatCard label="LTV" value="104.4€" sub="+89% vs 80g premium" highlight color="#1a3a2a"/>
                    <StatCard label="% Recurrentes" value="63.9%" sub="Mayor de todos los formatos"/>
                    <StatCard label="Clientes totales" value="4.547" sub="Oct 25 – Mar 26"/>
                  </div>
                </div>

                <div>
                  <p style={{fontSize:'0.72rem',fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'12px'}}>Tabla comparativa — Todos los formatos</p>
                  <div style={{background:'#fff',borderRadius:'0.75rem',border:'1px solid #e5e7eb',overflow:'hidden'}}>
                    <table style={{width:'100%',fontSize:'0.875rem'}}>
                      <thead>
                        <tr style={{background:'#f9fafb',borderBottom:'1px solid #e5e7eb'}}>
                          {['Producto','Clientes','% Nuevos','% Recurrentes','Retención¹','Avg Orders','Avg Items','AOV','LTV'].map((h,i)=>(
                            <th key={h} style={{padding:'12px 16px',fontWeight:600,color:'#4b5563',textAlign:i===0?'left':'right'}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {PRODUCTS.map((p,i)=>(
                          <tr key={p.id} style={{borderBottom:'1px solid #f3f4f6',background:p.id==="200g_premium"?'#f0fdf4':i%2===0?'#fff':'#fafafa'}}>
                            <td style={{padding:'12px 16px',fontWeight:600,color:p.color}}>{p.label} {p.id==="200g_premium"&&"★"}</td>
                            <td style={{padding:'12px 16px',textAlign:'right',color:'#374151'}}>{p.total.toLocaleString('es-ES')}</td>
                            <td style={{padding:'12px 16px',textAlign:'right',color:'#374151'}}>{p.newPct}%</td>
                            <td style={{padding:'12px 16px',textAlign:'right',color:'#374151'}}>{p.returningPct}%</td>
                            <td style={{padding:'12px 16px',textAlign:'right',fontWeight:600,color:p.retentionRate>BENCHMARK?'#15803d':'#374151'}}>{p.retentionRate}%</td>
                            <td style={{padding:'12px 16px',textAlign:'right',color:'#374151'}}>{p.avgOrders}</td>
                            <td style={{padding:'12px 16px',textAlign:'right',color:'#374151'}}>{p.avgItems}</td>
                            <td style={{padding:'12px 16px',textAlign:'right',fontWeight:500,color:'#1f2937'}}>{p.aov}€</td>
                            <td style={{padding:'12px 16px',textAlign:'right',fontWeight:700,color:p.id==="200g_premium"?'#15803d':'#1f2937'}}>{p.ltv}€</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot>
                        <tr style={{background:'#f9fafb',borderTop:'2px solid #d1d5db'}}>
                          <td colSpan={4} style={{padding:'8px 16px',fontSize:'0.7rem',color:'#6b7280',fontStyle:'italic'}}>¹ Retención = % clientes que hicieron su primera compra Oct–Ene y volvieron a comprar</td>
                          <td colSpan={5} style={{padding:'8px 16px',fontSize:'0.7rem',color:'#6b7280',fontStyle:'italic',textAlign:'right'}}>Benchmark marca: 17% segunda compra a 90 días</td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem'}}>
                  {[
                    {n:'Patrón 1',title:'Mayor formato → Mayor retención',body:'200g (23.8%) › 80g prem. (18.7%) › 80g orig. (14.5%) › 30g prem. (13.7%) › 30g orig. (11.4%). Correlación perfectamente ordenada.'},
                    {n:'Patrón 2',title:'Premium retiene más que Original',body:'80g: Premium (18.7%) vs Original (14.5%) → +4.2pp. 30g: Premium (13.7%) vs Original (11.4%) → +2.3pp. La calidad fideliza.'},
                    {n:'Patrón 3',title:'Pequeño formato = captación de nuevos',body:'30g original lidera en nuevos clientes (60%). El 200g y 80g son fundamentalmente productos de clientes recurrentes (~64% cada uno).'},
                  ].map(item=>(
                    <div key={item.n} style={S.card}>
                      <p style={{fontSize:'0.68rem',fontWeight:600,color:'#6b7280',textTransform:'uppercase',marginBottom:'8px'}}>{item.n}</p>
                      <p style={{fontWeight:600,color:'#1f2937',fontSize:'0.875rem',marginBottom:'4px'}}>{item.title}</p>
                      <p style={{fontSize:'0.75rem',color:'#4b5563'}}>{item.body}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── SEGMENTOS ── */}
            {tab==="segments" && (
              <div style={S.gap6}>
                <div style={S.cardL}>
                  <p style={{fontWeight:600,color:'#1f2937',marginBottom:'4px'}}>% Clientes nuevos vs recurrentes por formato</p>
                  <p style={{fontSize:'0.75rem',color:'#6b7280',marginBottom:'16px'}}>Clientes que compraron el producto en el período Oct 2025 – Mar 2026</p>
                  <BarChartSVG data={segData} dataKeys={["Clientes nuevos %","Clientes recurrentes %"]} colors={["#52b788","#1a3a2a"]} height={280} maxY={100} yFmt={v=>`${v}%`} legendLabels={["Clientes nuevos %","Clientes recurrentes %"]}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                  <div style={S.card}>
                    <p style={{fontWeight:600,color:'#1f2937',marginBottom:'12px',fontSize:'0.875rem'}}>Clientes totales por formato (Oct–Mar)</p>
                    <div style={S.gap2}>
                      {PRODUCTS.map(p=>(
                        <div key={p.id} style={{display:'flex',alignItems:'center',gap:'8px'}}>
                          <div style={{width:'6rem',fontSize:'0.75rem',color:'#4b5563',textAlign:'right',flexShrink:0}}>{p.shortLabel}</div>
                          <div style={{flex:1,background:'#f3f4f6',borderRadius:'9999px',height:'20px',overflow:'hidden'}}>
                            <div style={{height:'100%',borderRadius:'9999px',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'8px',width:`${(p.total/29140)*100}%`,backgroundColor:p.color,minWidth:'40px'}}>
                              <span style={{fontSize:'0.68rem',color:'#fff',fontWeight:500}}>{p.total.toLocaleString('es-ES')}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <p style={{fontSize:'0.68rem',color:'#9ca3af',marginTop:'12px'}}>* Escala relativa al producto de mayor volumen (80g premium)</p>
                  </div>
                  <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'0.75rem',padding:'1rem'}}>
                    <p style={{fontWeight:600,color:'#92400e',marginBottom:'8px',fontSize:'0.875rem'}}>⚠️ Observación sobre el 200g</p>
                    <p style={{fontSize:'0.75rem',color:'#374151',marginBottom:'12px'}}>El 200g es el formato con <strong>menor volumen de clientes</strong> (4.547 vs 29.140 del 80g), pero el 63.9% son recurrentes — igual que el 80g premium.</p>
                    <p style={{fontSize:'0.75rem',color:'#374151',marginBottom:'12px'}}>Esto significa que el 200g <strong>no está captando nuevos clientes</strong> en proporciones relevantes — lo compran clientes que ya conocen el producto y confían en él.</p>
                    <p style={{fontSize:'0.75rem',color:'#374151'}}><strong>Implicación para Veepee:</strong> Incluir el 200g en campañas de captación podría no ser óptimo. El 80g (precio más accesible, misma retención) es mejor entrada para nuevos clientes en canales de descuento.</p>
                  </div>
                </div>
              </div>
            )}

            {/* ── RETENCIÓN ── */}
            {tab==="retention" && (
              <div style={S.gap6}>
                <div style={S.cardL}>
                  <p style={{fontWeight:600,color:'#1f2937',marginBottom:'4px'}}>Tasa de retención por formato</p>
                  <p style={{fontSize:'0.75rem',color:'#6b7280',marginBottom:'16px'}}>Clientes primera compra Oct–Ene que volvieron a comprar. Benchmark marca: 17% segunda compra a 90 días</p>
                  <BarChartSVG data={retData} dataKeys={["Retención (%)"]} colors={PRODUCTS.map(p=>p.color)} height={280} maxY={30} yFmt={v=>`${v}%`}/>
                  <p style={{fontSize:'0.68rem',color:'#9ca3af',textAlign:'center',marginTop:'4px'}}>— Benchmark marca: 17% —</p>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                  <div style={{...S.card,display:'flex',flexDirection:'column',gap:'12px'}}>
                    <p style={{fontWeight:600,color:'#1f2937',fontSize:'0.875rem'}}>Correlación formato → retención</p>
                    {PRODUCTS.map(p=>(
                      <div key={p.id} style={{display:'flex',alignItems:'center',gap:'12px'}}>
                        <span style={{fontSize:'0.75rem',width:'5rem',textAlign:'right',color:'#4b5563',flexShrink:0}}>{p.shortLabel}</span>
                        <div style={{flex:1,background:'#f3f4f6',borderRadius:'9999px',height:'24px',overflow:'hidden'}}>
                          <div style={{height:'100%',borderRadius:'9999px',display:'flex',alignItems:'center',justifyContent:'center',width:`${(p.retentionRate/25)*100}%`,backgroundColor:p.color,minWidth:'36px'}}>
                            <span style={{fontSize:'0.75rem',color:'#fff',fontWeight:700}}>{p.retentionRate}%</span>
                          </div>
                        </div>
                        {p.retentionRate>BENCHMARK&&<span style={{fontSize:'0.75rem',color:'#16a34a',fontWeight:500,flexShrink:0}}>↑ bmk</span>}
                      </div>
                    ))}
                  </div>
                  <div style={S.gap3}>
                    <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'0.75rem',padding:'1rem'}}>
                      <p style={{fontSize:'0.68rem',fontWeight:600,color:'#15803d',textTransform:'uppercase',marginBottom:'4px'}}>Ganador claro</p>
                      <p style={{fontSize:'0.875rem',color:'#1f2937'}}>El <strong>200g premium</strong> tiene un 23.8% de retención — <strong>+6.8pp sobre el benchmark de marca</strong> (17%) y +5.1pp sobre el 80g premium.</p>
                    </div>
                    <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'0.75rem',padding:'1rem'}}>
                      <p style={{fontSize:'0.68rem',fontWeight:600,color:'#1d4ed8',textTransform:'uppercase',marginBottom:'4px'}}>Hipótesis sobre el porqué</p>
                      <p style={{fontSize:'0.875rem',color:'#1f2937'}}>Un cliente que invierte 75.95€ en un formato grande está más <strong>comprometido con el hábito</strong>. Mayor inversión = mayor intent de incorporarlo a la rutina.</p>
                    </div>
                    <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'0.75rem',padding:'1rem'}}>
                      <p style={{fontSize:'0.68rem',fontWeight:600,color:'#b45309',textTransform:'uppercase',marginBottom:'4px'}}>Pregunta sin responder</p>
                      <p style={{fontSize:'0.875rem',color:'#1f2937'}}>El 200g dura más (aprox. 3–4 meses vs 1 mes del 80g). <strong>No sabemos el tiempo entre compras</strong>, lo que podría inflar o deflactar el valor real de la retención.</p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── AOV & LTV ── */}
            {tab==="value" && (
              <div style={S.gap6}>
                <div style={S.cardL}>
                  <p style={{fontWeight:600,color:'#1f2937',marginBottom:'4px'}}>AOV vs LTV por formato</p>
                  <p style={{fontSize:'0.75rem',color:'#6b7280',marginBottom:'16px'}}>AOV = ticket medio de la primera orden. LTV = valor total del cliente en el período.</p>
                  <BarChartSVG data={valData} dataKeys={["AOV (€)","LTV (€)"]} colors={["#2d6a4f","#1a3a2a"]} height={280} yFmt={v=>`${v}€`} legendLabels={["AOV (€)","LTV (€)"]}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem'}}>
                  <div style={S.card}>
                    <p style={{fontWeight:600,color:'#1f2937',fontSize:'0.875rem',marginBottom:'12px'}}>LTV / AOV ratio</p>
                    <p style={{fontSize:'0.75rem',color:'#6b7280',marginBottom:'12px'}}>Cuánto más gasta el cliente por encima de su primera compra</p>
                    {PRODUCTS.map(p=>(
                      <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>
                        <span style={{fontSize:'0.75rem',color:'#4b5563'}}>{p.shortLabel}</span>
                        <span style={{fontSize:'0.875rem',fontWeight:700,color:p.id==="200g_premium"?'#15803d':'#1f2937'}}>×{(p.ltv/p.aov).toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                  <div style={S.card}>
                    <p style={{fontWeight:600,color:'#1f2937',fontSize:'0.875rem',marginBottom:'12px'}}>Valor incremental (LTV − AOV)</p>
                    <p style={{fontSize:'0.75rem',color:'#6b7280',marginBottom:'12px'}}>Euros adicionales generados por encima del primer pedido</p>
                    {PRODUCTS.map(p=>(
                      <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>
                        <span style={{fontSize:'0.75rem',color:'#4b5563'}}>{p.shortLabel}</span>
                        <span style={{fontSize:'0.875rem',fontWeight:700,color:p.id==="200g_premium"?'#15803d':'#1f2937'}}>+{(p.ltv-p.aov).toFixed(1)}€</span>
                      </div>
                    ))}
                  </div>
                  <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'0.75rem',padding:'1rem'}}>
                    <p style={{fontSize:'0.68rem',fontWeight:600,color:'#15803d',textTransform:'uppercase',marginBottom:'8px'}}>El 200g domina en valor</p>
                    <p style={{fontSize:'0.875rem',color:'#1f2937',marginBottom:'8px'}}>LTV de <strong>104.4€</strong> — casi el doble del 80g premium (55.2€).</p>
                    <p style={{fontSize:'0.875rem',color:'#1f2937',marginBottom:'8px'}}>Genera <strong>+26.7€ por encima del AOV</strong>, el mayor valor incremental de todos los formatos.</p>
                    <p style={{fontSize:'0.875rem',color:'#1f2937'}}>Un cliente de 200g vale <strong>×1.9 más</strong> que uno de 80g premium a lo largo del período analizado.</p>
                  </div>
                </div>
              </div>
            )}

            {/* ── VEREDICTO ── */}
            {tab==="verdict" && (
              <div style={S.gap5}>
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'0.75rem',padding:'1.25rem'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                    <div style={{fontSize:'1.5rem',lineHeight:1}}>✅</div>
                    <div>
                      <p style={{fontWeight:700,color:'#166534',fontSize:'1.125rem',marginBottom:'4px'}}>El 200g Premium beneficia al negocio</p>
                      <p style={{fontSize:'0.875rem',color:'#166534'}}>En todas las métricas clave — retención, AOV y LTV — el 200g lidera con ventaja significativa. No hay ninguna señal en los datos que indique que perjudica al negocio.</p>
                    </div>
                  </div>
                </div>

                <div style={S.gap3}>
                  <p style={{fontSize:'0.72rem',fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em'}}>Respuestas a las preguntas del análisis</p>
                  {[
                    { q:'¿Mayor cantidad = mejor retención?', a:'Sí. La correlación es perfecta y sin excepciones: 200g (23.8%) → 80g prem. (18.7%) → 80g orig. (14.5%) → 30g prem. (13.7%) → 30g orig. (11.4%). Cuanto mayor el formato, mayor el compromiso del cliente con el hábito.', tags:[{type:'positive',text:'Patrón validado'},{type:'positive',text:'Consistente en premium y original'}] },
                    { q:'¿A qué segmento (nuevo / recurrente) atrae más cada formato?', html:'<strong>Formatos grandes (200g, 80g):</strong> ~64% clientes recurrentes. Son productos de "upgrade" — los compra quien ya conoce y confía en la marca.<br/><strong>Formatos pequeños (30g original):</strong> 60% nuevos clientes. Son el punto de entrada para quienes prueban por primera vez.<br/><strong>30g premium y 80g original:</strong> zona intermedia (~46-52% nuevos), mezcla equilibrada.', tags:[{type:'positive',text:'200g = producto de fidelización'},{type:'neutral',text:'30g original = producto de captación'},{type:'neutral',text:'80g premium = equilibrio captación/fidelización'}] },
                    { q:'¿Debería incluirse en Veepee?', html:'Depende del objetivo de la campaña. El 200g tiene solo 36.2% de clientes nuevos — no es un formato de captación. Incluirlo en Veepee tiene sentido solo si el objetivo es activar clientes existentes o generar AOV alto en un canal de descuento. <strong>Para captar nuevos clientes, el 80g premium (36.9% nuevos, 18.7% retención, precio más accesible) es el formato óptimo.</strong>', tags:[{type:'warning',text:'200g en Veepee = riesgo de canibalizar márgen sin captación'},{type:'positive',text:'80g premium = mejor entrada en canales de descuento'}] },
                    { q:'¿Genera fricción en la experiencia de compra o afecta conversiones?', a:'Los datos no permiten responderlo directamente. El volumen del 200g (4.547 clientes) es significativamente menor al 80g (29.140), pero eso puede deberse al precio (75.95€) y no a fricción en el funnel. La mejor forma de validarlo es con un A/B test en la página de producto o colección.', tags:[{type:'warning',text:'Sin datos suficientes para concluir'},{type:'neutral',text:'Recomendar A/B test de visibilidad del 200g'}] },
                    { q:'¿Cuánto tarda el cliente de 200g en volver a comprar?', a:'Dato no disponible en Metorik con los segmentos actuales. Es una métrica crítica porque el 200g dura ~3-4 meses vs ~1 mes del 80g. Si el tiempo entre compras es proporcional al formato, el LTV real por año podría estar en línea con el 80g. Sin este dato, la comparativa de LTV es parcial.', tags:[{type:'warning',text:'Métrica pendiente de extraer'},{type:'neutral',text:'Extraer con cohort analysis en Metorik'}] },
                  ].map((item,idx)=>(
                    <div key={idx} style={S.card}>
                      <p style={{fontWeight:600,color:'#1f2937',fontSize:'0.875rem',marginBottom:'8px'}}>{item.q}</p>
                      {item.html
                        ? <p style={{fontSize:'0.875rem',color:'#4b5563',marginBottom:'8px'}} dangerouslySetInnerHTML={{__html:item.html}}/>
                        : <p style={{fontSize:'0.875rem',color:'#4b5563',marginBottom:'8px'}}>{item.a}</p>
                      }
                      <div>{item.tags.map((t,i)=><Tag key={i} type={t.type} text={t.text}/>)}</div>
                    </div>
                  ))}
                </div>

                <div style={S.card}>
                  <p style={{fontWeight:600,color:'#1f2937',fontSize:'0.875rem',marginBottom:'12px'}}>Próximos pasos recomendados</p>
                  <div style={S.gap2}>
                    {[
                      {n:'1',text:'Extraer tiempo entre compras del cliente de 200g en Metorik (cohort analysis por producto)',priority:'Alta'},
                      {n:'2',text:'Para Veepee: priorizar 80g premium como producto de entrada, no el 200g',priority:'Alta'},
                      {n:'3',text:'A/B test: visibilidad del 200g en la colección / página de producto para medir impacto en conversión general',priority:'Media'},
                      {n:'4',text:'Analizar si el 200g está siendo comprado principalmente en ES/FR o tiene presencia en otros mercados',priority:'Baja'},
                    ].map(r=>(
                      <div key={r.n} style={{display:'flex',alignItems:'flex-start',gap:'12px',padding:'8px',borderRadius:'0.5rem',background:'#f9fafb'}}>
                        <span style={{fontSize:'0.75rem',fontWeight:700,color:'#9ca3af',width:'16px',flexShrink:0,marginTop:'2px'}}>{r.n}</span>
                        <p style={{fontSize:'0.875rem',color:'#374151',flex:1}}>{r.text}</p>
                        <span style={{fontSize:'0.68rem',fontWeight:500,padding:'2px 8px',borderRadius:'9999px',flexShrink:0,background:r.priority==='Alta'?'#fee2e2':r.priority==='Media'?'#fef3c7':'#f3f4f6',color:r.priority==='Alta'?'#b91c1c':r.priority==='Media'?'#b45309':'#4b5563'}}>{r.priority}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
